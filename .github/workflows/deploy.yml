name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./generator-yaml/package-lock.json" # Dit à GitHub où est le lock

      - name: Install dependencies
        run: npm install --legacy-peer-deps # 👈 On ajoute ça ici
        working-directory: ./generator-yaml # Se déplace dans ton dossier

      - name: Build
        run: npm run build
        working-directory: ./generator-yaml # Se déplace dans ton dossier

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./generator-yaml/dist # Va chercher le dossier dist au bon endroit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
